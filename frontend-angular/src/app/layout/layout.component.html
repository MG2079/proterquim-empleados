<div class="layout">

  <!-- 🔵 HEADER GLOBAL -->
  <header class="header">

    <div class="logo">
      <img src="assets/logo.png" alt="Logo" />
      <span>Proterquim S.A.S</span>
    </div>

    <div class="top-bar">
      <div class="search-box">
        <input type="text" placeholder="Buscar..." />
      </div>

      <div class="user-info">
        👤 Admin
      </div>
    </div>

  </header>

  <!-- 🔽 BODY -->
  <div class="body">

    <!-- 🧭 SIDEBAR GLOBAL -->
    <aside class="sidebar">

      <div class="menu">

        <div class="menu-item" (click)="irADashboard()">📊 Panel de control</div>

        <div class="menu-item" (click)="irAProductos()">📦 Gestión de Productos</div>

        <div class="menu-item">🧾 Gestión de Pedidos</div>

        <div class="menu-item">📊 Inventarios</div>

        <div class="menu-item">📑 Reportes</div>

        <div class="menu-item" (click)="irAEmpleados()">⚙️ Gestión de Empleados</div>

      </div>

      <div class="logout-bottom">
        <button (click)="logout()">Cerrar sesión</button>
      </div>

    </aside>

    <!-- 📄 CONTENIDO DINÁMICO -->
    <main class="main">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
