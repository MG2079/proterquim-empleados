<h1>Gestión de Productos</h1>

<!-- 🔔 MENSAJE -->
<div *ngIf="mensaje" class="mensaje" [ngClass]="tipoMensaje">
  {{ mensaje }}
</div>

<!-- 🧾 FORMULARIO -->
<div class="form-row">
  <input [(ngModel)]="nuevoProducto.nombre" placeholder="Nombre">
  <input [(ngModel)]="nuevoProducto.descripcion" placeholder="Descripción">
  <input type="number" [(ngModel)]="nuevoProducto.precio" placeholder="Precio">
  <input type="number" [(ngModel)]="nuevoProducto.stock" placeholder="Stock">

  <button class="btn-agregar" (click)="crearProducto()">
    Agregar
  </button>
</div>

<!-- 📊 TABLA -->
<div class="tabla-container">

  <table>

    <thead>
      <tr>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>

      <!-- SIN DATOS -->
      <tr *ngIf="productosFiltrados.length === 0">
        <td colspan="4" class="centrado">
          No hay productos
        </td>
      </tr>

      <!-- LISTADO -->
      <tr *ngFor="let p of productosFiltrados">
        <td>{{ p.nombre }}</td>
        <td>{{ p.precio | number:'1.0-0' }}</td>
        <td>{{ p.stock }}</td>

        <td>
          <button class="btn-editar" (click)="editarProducto(p)">
            Editar
          </button>

          <button class="btn-eliminar" (click)="p._id && eliminarProducto(p._id)">
            Eliminar
          </button>
        </td>
      </tr>

    </tbody>

  </table>

</div>

<!-- ✏️ EDITAR -->
<div *ngIf="productoEditando" class="form-edicion">

  <h3>Editar Producto</h3>

  <div class="form-row">
    <input [(ngModel)]="productoEditando.nombre" placeholder="Nombre">
    <input [(ngModel)]="productoEditando.descripcion" placeholder="Descripción">
    <input type="number" [(ngModel)]="productoEditando.precio" placeholder="Precio">
    <input type="number" [(ngModel)]="productoEditando.stock" placeholder="Stock">

    <button class="btn-agregar" (click)="actualizarProducto()">
      Guardar
    </button>

    <button class="btn-eliminar" (click)="cancelarEdicion()">
      Cancelar
    </button>
  </div>

</div>
