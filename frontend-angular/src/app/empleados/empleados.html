<h1>Gestión de Empleados</h1>

<!-- 🔔 MENSAJE -->
<div *ngIf="mensaje" [ngClass]="tipoMensaje">
  {{ mensaje }}
</div>

<!-- 🧾 FORMULARIO -->
<div class="form-row">

  <input [(ngModel)]="nuevoEmpleado.nombre" placeholder="Nombre">
  <input [(ngModel)]="nuevoEmpleado.cargo" placeholder="Cargo">
  <input type="number" [(ngModel)]="nuevoEmpleado.salario" placeholder="Salario">

  <button class="btn-agregar" (click)="crearEmpleado()">
    Agregar
  </button>

</div>

<!-- 📊 TABLA -->
<div class="tabla-container">

  <table>

    <thead>
      <tr>
        <th>Nombre</th>
        <th>Cargo</th>
        <th>Salario</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>

      <!-- SIN DATOS -->
      <tr *ngIf="empleadosFiltrados.length === 0">
        <td colspan="4" class="centrado">
          No hay empleados registrados
        </td>
      </tr>

      <!-- LISTADO -->
      <tr *ngFor="let emp of empleadosFiltrados">
        <td>{{ emp.nombre }}</td>
        <td>{{ emp.cargo }}</td>
        <td>{{ emp.salario | number:'1.0-0' }}</td>

        <td>
          <button class="btn-editar" (click)="editarEmpleado(emp)">
            Editar
          </button>

          <button class="btn-eliminar" (click)="emp._id && eliminarEmpleado(emp._id)">
            Eliminar
          </button>
        </td>
      </tr>

    </tbody>

  </table>

</div>

<!-- ✏️ EDICIÓN -->
<div *ngIf="empleadoEditando" class="form-edicion">

  <h3>Editar Empleado</h3>

  <div class="form-row">
    <input [(ngModel)]="empleadoEditando.nombre" placeholder="Nombre">
    <input [(ngModel)]="empleadoEditando.cargo" placeholder="Cargo">
    <input type="number" [(ngModel)]="empleadoEditando.salario" placeholder="Salario">

    <button class="btn-agregar" (click)="actualizarEmpleado()">
      Guardar
    </button>

    <button class="btn-eliminar" (click)="cancelarEdicion()">
      Cancelar
    </button>
  </div>

</div>
